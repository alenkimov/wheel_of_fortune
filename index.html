<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Рулетка Фортуны</title>
  <link rel="stylesheet" href="./static/style.css">
</head>
<body>
  <main>
    <section class="stage" aria-label="Рулетка фортуны">
      <div class="machine">
        <div class="slot-frame" id="frame">
          <div class="winner-line" aria-hidden="true"></div>
          <div class="reel" id="reel" aria-hidden="true"></div>
        </div>
      </div>

      <button type="button" id="spin">Крутить</button>
    </section>
  </main>

  <script src="./static/app.js"></script>
</body>
</html>
